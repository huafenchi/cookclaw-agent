# GoReleaser config for CookClaw Agent
# Triggered by GitHub Actions on tag push (v*)

version: 2

builds:
  - id: cookclaw-agent
    main: .
    binary: cookclaw-agent-{{ .Os }}-{{ .Arch }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

archives:
  - format: binary
    name_template: "{{ .Binary }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: huafenchi
    name: cookclaw-agent
  draft: false
  prerelease: auto
